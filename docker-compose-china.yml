# BuildKit 用于 Dockerfile 中 apt/pip/npm 构建缓存，建议先执行: export DOCKER_BUILDKIT=1
services:
  sandbox:
    build:
      context: ./ScienceClaw/sandbox
      dockerfile: Dockerfile.china
    image: scienceclaw-sandbox:local
    security_opt:
      - seccomp:unconfined
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "2gb"
    mem_limit: ${SANDBOX_MEM_LIMIT:-8g}
    cpus: ${SANDBOX_CPUS:-4}
    environment:
      TZ: Asia/Shanghai
      WEBSEARCH_URL: http://websearch:8068
    volumes:
      - ./Skills:/skills:ro
      - ./Tools:/app/Tools:ro
      - ./ScienceClaw/backend/builtin_skills:/builtin-skills:ro
      - ./workspace:/home/scienceclaw
    ports:
      - "18080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/docs >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  mongo:
    image: scienceclaw-mongo:local
    build:
      context: ScienceClaw/mongo
      dockerfile: Dockerfile.china
    environment:
      MONGO_INITDB_ROOT_USERNAME: scienceone
      MONGO_INITDB_ROOT_PASSWORD: Yp51Bi1eEjC77sAt
    ports:
      - "27014:27017"
    volumes:
      - scienceclaw_mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: scienceclaw-redis:local
    build:
      context: ScienceClaw/redis
      dockerfile: Dockerfile.china
    restart: unless-stopped

  # ── SearXNG 搜索引擎（websearch 服务的依赖） ──
  searxng:
    image: scienceclaw-searxng:local
    build:
      context: ScienceClaw/searxng
      dockerfile: Dockerfile.china
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      SEARXNG_LIMITER: "false"
      TZ: Asia/Shanghai
    volumes:
      - ./ScienceClaw/websearch/config/settings.yml:/etc/searxng/settings.yml
    ports:
      - "26080:8080"
    restart: unless-stopped

  # ── 网页搜索 + 爬取服务（替代 Tavily） ──
  websearch:
    build:
      context: ./ScienceClaw/websearch
      dockerfile: Dockerfile.china
    image: scienceclaw-websearch:local
    environment:
      SEARXNG_HOST: searxng
      SEARXNG_PORT: 8080
      API_HOST: "0.0.0.0"
      API_PORT: 8068
      TZ: Asia/Shanghai
      API_KEY: "fdsfkjikmii"
    ports:
      - "8068:8068"
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_started

  backend:
    build:
      context: ./ScienceClaw/backend
      dockerfile: Dockerfile.china
    image: scienceclaw-backend:local
    volumes:
      - ./ScienceClaw/backend:/app/backend
      - ./ScienceClaw/backend/builtin_skills:/app/builtin_skills:ro
      - ./Tools:/app/Tools
      - ./Skills:/app/Skills
      - ./workspace:/home/scienceclaw
    environment:
      SANDBOX_REST_URL: http://sandbox:8080
      WORKSPACE_DIR: /home/scienceclaw
      DS_API_KEY: ${API_KEY:-}
      DS_URL: ${API_BASE-https://api.deepseek.com/v1}
      DS_MODEL: ${MODEL_NAME-deepseek-chat}
      TEMPERATURE: ${TEMPERATURE-0.7}
      MAX_TOKENS: ${MAX_TOKENS-2000}
      LOG_LEVEL: ${LOG_LEVEL-INFO}
      FILE_DOWNLOAD_ALLOWED_PREFIXES: /tmp,/app,/home/scienceclaw
      TZ: Asia/Shanghai
      AUTH_PROVIDER: local
      BOOTSTRAP_ADMIN_ENABLED: "true"
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: admin123
      BOOTSTRAP_ADMIN_FULLNAME: Administrator
      BOOTSTRAP_ADMIN_EMAIL: admin@localhost
      BOOTSTRAP_UPDATE_ADMIN_PASSWORD: "true"
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      TASK_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
      WEBSEARCH_API_KEY: "fdsfkjikmii"
      # 网页搜索服务地址（Docker 内部通信）
      WEBSEARCH_BASE_URL: http://websearch:8068
      WEBSEARCH_URL: http://websearch:8068
      # 诊断模式：记录每步 LLM 调用的完整上下文，用于质量分析（设为空或删除此行关闭）
      DIAGNOSTIC_MODE: "1"
      IM_ENABLED: "true"
      IM_RESPONSE_TIMEOUT: 300
      IM_MAX_MESSAGE_LENGTH: 4000
      LARK_ENABLED: "true"
      LARK_APP_ID: ${LARK_APP_ID-}
      LARK_APP_SECRET: ${LARK_APP_SECRET-}
    ports:
      - "12001:8000"
    command: >
      python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend
    restart: unless-stopped
    depends_on:
      sandbox:
        condition: service_started
      mongo:
        condition: service_started
      websearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/auth/status >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  # ── 任务调度服务（Task Service）──
  scheduler_api:
    build:
      context: ScienceClaw/task-service
      dockerfile: Dockerfile.china
    image: scienceclaw-task-service:local
    environment:
      TZ: Asia/Shanghai
      DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      REDIS_URL: redis://redis:6379/0
      CHAT_SERVICE_URL: http://backend:8000
      CHAT_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
      DS_API_KEY: ${API_KEY:-}
      DS_URL: ${API_BASE:-https://api.deepseek.com/v1}
      DS_MODEL: ${MODEL_NAME:-deepseek-chat}
    ports:
      - "12002:8001"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_started

  celery_worker:
    image: scienceclaw-task-service:local
    pull_policy: never
    environment:
      TZ: Asia/Shanghai
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      REDIS_URL: redis://redis:6379/0
      CHAT_SERVICE_URL: http://backend:8000
      CHAT_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
    command: celery -A app.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      scheduler_api:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_started

  celery_beat:
    image: scienceclaw-task-service:local
    pull_policy: never
    environment:
      TZ: Asia/Shanghai
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.celery_app beat --loglevel=info
    restart: unless-stopped
    depends_on:
      scheduler_api:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    image: swr.cn-north-4.myhuaweicloud.com/claw/node:20-bookworm-slim
    working_dir: /app
    environment:
      BACKEND_URL: http://backend:8000
      # 定时任务服务：Vite 代理 /task-service 时转发到该地址（容器内使用服务名）
      TASK_SERVICE_URL: http://scheduler_api:8001
      # 任务执行时间展示时区，默认北京时间（与 DISPLAY_TIMEZONE 一致）
      VITE_DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      NPM_CONFIG_CACHE: /npm-cache
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      TZ: Asia/Shanghai
    volumes:
      - ./ScienceClaw/frontend:/app
      - scienceclaw_frontend_node_modules:/app/node_modules
      - scienceclaw_frontend_npm_cache:/npm-cache
    ports:
      - "5173:5173"
    command: >
      sh -lc "npm install --no-fund --no-audit && npm run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      scheduler_api:
        condition: service_started

volumes:
  scienceclaw_mongo_data:
  scienceclaw_frontend_node_modules:
  scienceclaw_frontend_npm_cache:
