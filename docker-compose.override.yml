# Docker Compose Override — 本地开发配置
#
# 使用方法:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up
#
# 此文件覆盖生产/默认配置，启用本地开发特性：
# - 源码目录 volume mount（热重载）
# - 调试端口暴露
# - 开发环境变量

services:
  backend:
    volumes:
      - ./ScienceClaw/backend:/app/backend
      - ./ScienceClaw/backend/builtin_skills:/app/builtin_skills:ro
      - ./Tools:/app/Tools
      - ./Skills:/app/Skills
      - ./workspace:/home/scienceclaw
    environment:
      LOG_LEVEL: DEBUG
      DIAGNOSTIC_MODE: "1"
      POSTGRES_URI: postgresql+asyncpg://rv:rv_password@postgres:5432/rv_checkpoints

  frontend:
    volumes:
      - ./ScienceClaw/frontend:/app
      - scienceclaw_frontend_node_modules:/app/node_modules
      - scienceclaw_frontend_npm_cache:/npm-cache
    environment:
      BACKEND_URL: http://backend:8000
      VITE_BACKEND_URL: http://localhost:12001
      VITE_API_BASE_URL: http://localhost:12001/api/v1
      VITE_DISPLAY_TIMEZONE: Asia/Shanghai
      NODE_ENV: development

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  mongo:
    ports:
      - "27014:27017"

  qemu-sandbox:
    volumes:
      - ./workspace:/workspace
      - ./ScienceClaw/sandbox:/sandbox:ro
