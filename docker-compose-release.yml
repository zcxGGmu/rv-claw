services:
  sandbox:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-sandbox:release-v0.0.4
    security_opt:
    - seccomp:unconfined
    extra_hosts:
    - host.docker.internal:host-gateway
    shm_size: 2gb
    mem_limit: ${SANDBOX_MEM_LIMIT:-8g}
    cpus: ${SANDBOX_CPUS:-4}
    environment:
      TZ: Asia/Shanghai
      WEBSEARCH_URL: http://websearch:8068
    volumes:
    - ./Skills:/skills:ro
    - ./Tools:/app/Tools:ro
    - ./ScienceClaw/backend/builtin_skills:/builtin-skills:ro
    - ./workspace:/home/scienceclaw:rwx
    ports:
    - 18080:8080
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8080/v1/docs >/dev/null || exit 1
      interval: 5s
      timeout: 3s
      retries: 30
  mongo:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-mongo:release-v0.0.4
    environment:
      MONGO_INITDB_ROOT_USERNAME: scienceone
      MONGO_INITDB_ROOT_PASSWORD: Yp51Bi1eEjC77sAt
    ports:
    - 27014:27017
    volumes:
    - scienceclaw_mongo_data:/data/db
    restart: unless-stopped
  searxng:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-searxng:release-v0.0.4
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      SEARXNG_LIMITER: 'false'
      TZ: Asia/Shanghai
    volumes:
    - ./ScienceClaw/websearch/config/settings.yml:/etc/searxng/settings.yml
    ports:
    - 26080:8080
    restart: unless-stopped
  websearch:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-websearch:release-v0.0.4
    environment:
      SEARXNG_HOST: searxng
      SEARXNG_PORT: 8080
      API_HOST: 0.0.0.0
      API_PORT: 8068
      TZ: Asia/Shanghai
      API_KEY: fdsfkjikmii
    ports:
    - 8068:8068
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_started
  backend:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-backend:release-v0.0.4
    volumes:
    - ./Tools:/app/Tools
    - ./Skills:/app/Skills
    - ./workspace:/home/scienceclaw
    environment:
      SANDBOX_REST_URL: http://sandbox:8080
      WORKSPACE_DIR: /home/scienceclaw
      DS_API_KEY: ${API_KEY:-}
      DS_URL: ${API_BASE-https://api.deepseek.com/v1}
      DS_MODEL: ${MODEL_NAME-deepseek-chat}
      TEMPERATURE: ${TEMPERATURE-0.7}
      MAX_TOKENS: ${MAX_TOKENS-2000}
      LOG_LEVEL: ${LOG_LEVEL-INFO}
      FILE_DOWNLOAD_ALLOWED_PREFIXES: /tmp,/app,/home/scienceclaw
      TZ: Asia/Shanghai
      AUTH_PROVIDER: local
      BOOTSTRAP_ADMIN_ENABLED: 'true'
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: admin123
      BOOTSTRAP_ADMIN_FULLNAME: Administrator
      BOOTSTRAP_ADMIN_EMAIL: admin@localhost
      BOOTSTRAP_UPDATE_ADMIN_PASSWORD: 'true'
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      WEBSEARCH_API_KEY: fdsfkjikmii
      WEBSEARCH_BASE_URL: http://websearch:8068
      WEBSEARCH_URL: http://websearch:8068
      TASK_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
      IM_ENABLED: 'true'
      IM_RESPONSE_TIMEOUT: 300
      IM_MAX_MESSAGE_LENGTH: 4000
      LARK_ENABLED: 'true'
      LARK_APP_ID: ${LARK_APP_ID-}
      LARK_APP_SECRET: ${LARK_APP_SECRET-}
    ports:
    - 12001:8000
    command: 'python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir /app/backend

      '
    restart: unless-stopped
    depends_on:
      sandbox:
        condition: service_started
      mongo:
        condition: service_started
      websearch:
        condition: service_started
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8000/api/v1/auth/status >/dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
  redis:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-redis:release-v0.0.4
    restart: unless-stopped
  scheduler_api:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-task-service:release-v0.0.4
    environment:
      TZ: Asia/Shanghai
      DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      REDIS_URL: redis://redis:6379/0
      CHAT_SERVICE_URL: http://backend:8000
      CHAT_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
      DS_API_KEY: ${API_KEY:-}
      DS_URL: ${API_BASE:-https://api.deepseek.com/v1}
      DS_MODEL: ${MODEL_NAME:-deepseek-chat}
    ports:
    - 12002:8001
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_started
  celery_worker:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-task-service:release-v0.0.4
    environment:
      TZ: Asia/Shanghai
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      REDIS_URL: redis://redis:6379/0
      CHAT_SERVICE_URL: http://backend:8000
      CHAT_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
    command: celery -A app.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      scheduler_api:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_started
  celery_beat:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-task-service:release-v0.0.4
    environment:
      TZ: Asia/Shanghai
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: scienceone
      MONGODB_PASSWORD: Yp51Bi1eEjC77sAt
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.celery_app beat --loglevel=info
    restart: unless-stopped
    depends_on:
      scheduler_api:
        condition: service_started
      redis:
        condition: service_started
  frontend:
    image: swr.cn-north-4.myhuaweicloud.com/claw/scienceclaw-frontend:release-v0.0.4
    environment:
      BACKEND_URL: http://backend:8000
      TASK_SERVICE_URL: http://scheduler_api:8001
      VITE_DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      NPM_CONFIG_CACHE: /npm-cache
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '300'
      TZ: Asia/Shanghai
    ports:
    - 5173:80
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      scheduler_api:
        condition: service_started
volumes:
  scienceclaw_mongo_data: null
  scienceclaw_frontend_node_modules: null
  scienceclaw_frontend_npm_cache: null
