name: CI

on:
  push:
    branches: [main, refactor/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python lint tools
        run: |
          pip install ruff mypy

      - name: Run ruff
        run: ruff check ScienceClaw/backend/

      - name: Run mypy
        run: mypy ScienceClaw/backend/ || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ScienceClaw/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ScienceClaw/frontend
        run: npm run lint || npx eslint --ext .ts,.vue src/ || true

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install -r ScienceClaw/backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run backend unit tests
        working-directory: ScienceClaw/backend
        run: pytest tests/unit/ -v --cov=backend --cov-report=xml || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ScienceClaw/frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: ScienceClaw/frontend
        run: npm run test:unit || true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rv_checkpoints
          POSTGRES_USER: rv
          POSTGRES_PASSWORD: rv_password
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          pip install -r ScienceClaw/backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run integration tests
        working-directory: ScienceClaw/backend
        env:
          MONGODB_HOST: localhost
          MONGODB_PORT: 27017
          POSTGRES_URI: postgresql+asyncpg://rv:rv_password@localhost:5432/rv_checkpoints
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/integration/ -v || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t rv-claw-backend:latest ./ScienceClaw/backend

      - name: Build frontend image
        run: docker build -t rv-claw-frontend:latest ./ScienceClaw/frontend || true

      - name: Validate docker-compose
        run: docker compose config
